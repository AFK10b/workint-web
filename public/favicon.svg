<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0D1B2A"/>
  <!-- W shape left stroke (white) -->
  <path d="M4 7 L8 22 L12 13 L16 22 L20 7" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- W shape right stroke (teal→blue gradient via linearGradient) -->
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1ECAB8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <path d="M16 7 L20 22 L24 13 L28 22" fill="none" stroke="url(#wg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Teal dot above -->
  <circle cx="16" cy="5" r="2.5" fill="#1ECAB8"/>
</svg>
